<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:#0a0a0a;
  color:#f5f5f5;
}
:root{--gold:#d4af37}

/* HERO */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  max-height:320px;
  background:#0a0a0a;
  border-bottom:4px solid var(--gold);
}
.hero img{
  width:100%;
  max-height:320px;
  object-fit:contain;
}

/* INFO */
.info{
  text-align:center;
  padding:15px;
}
.info h2{color:var(--gold);}
.info p{margin:5px 0;}

/* MOVING FIRST TWO IMAGES */
.moving{
  overflow:hidden;
  width:100%;
}
.track{
  display:flex;
  width:200%;
  animation:slide 8s linear infinite;
}
.track img{
  width:50%;
  height:250px;
  object-fit:cover;
}
@keyframes slide{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* IMAGE GRID */
.gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}
.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border:2px solid rgba(212,175,55,.4);
}

/* FORM */
.form-box{
  max-width:800px;
  margin:40px auto;
  padding:25px;
  border:1px solid rgba(212,175,55,.5);
  background:#050505;
}
.form-box h2{
  color:var(--gold);
  text-align:center;
}

.items{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.items label{
  display:flex;
  align-items:center;
  gap:10px;
  background:#0c0c0c;
  padding:12px;
  border:1px solid #333;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#0c0c0c;
  border:1px solid #333;
  color:#fff;
}

textarea{min-height:100px;}

button{
  margin-top:25px;
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#d4af37,#f1d27a);
  border:none;
  font-size:18px;
  font-weight:800;
}

/* BUTTONS */
.whatsapp,.call{
  position:fixed;
  right:18px;
  padding:14px 18px;
  border-radius:40px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}
.whatsapp{bottom:90px;background:#25d366}
.call{bottom:150px;background:#ff9800}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>

<div class="form-box">
<h2>Order Form</h2>
<form onsubmit="send();return false;">

<label>Customer Name</label>
<input id="name">

<label>Phone Number</label>
<input id="phone">

<label>Select Items</label>
<div class="items" id="items">
<label><input type="checkbox" value="Gas Cooker"> Gas Cooker</label>
<label><input type="checkbox" value="Microwave"> Microwave</label>
<label><input type="checkbox" value="Pots"> Pots</label>
<label><input type="checkbox" value="Broken Plates"> Broken Plates</label>
<label><input type="checkbox" value="Blender"> Blender</label>
<label><input type="checkbox" value="Plate Rack"> Plate Rack</label>
<label><input type="checkbox" value="Air Fryer"> Air Fryer</label>
<label><input type="checkbox" value="Spoons"> Spoons</label>
<label><input type="checkbox" value="Kettle"> Kettle</label>
<label><input type="checkbox" value="DIY Blenders"> Do It Yourself Blenders</label>
</div>

<label>Details</label>
<textarea id="details"></textarea>

<button>Send Order via WhatsApp</button>

</form>

<a class="whatsapp" href="https://wa.me/2347039320784">WhatsApp</a>
<a class="call" href="tel:09043376408">Call</a>

<script>
function send(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const details = document.getElementById("details").value;

  const items = [...document.querySelectorAll('#items input:checked')]
    .map(i=>i.value).join(', ');

  const msg = `Name: ${name}
Phone: ${phone}
Items: ${items}
Details: ${details}`;

  window.open("https://wa.me/2347039320784?text="+encodeURIComponent(msg));
}
</script>
